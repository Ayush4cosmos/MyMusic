name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push Docker image
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - run: |
          docker build -f backend/Dockerfile -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/raish-backend:${{ github.sha }} backend/
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/raish-backend:${{ github.sha }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: raish-backend
          images: ${{ secrets.REGISTRY_LOGIN_SERVER }}/raish-backend:${{ github.sha }}

      - name: Azure logout
        run: |
          az logout
