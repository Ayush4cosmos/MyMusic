name: raish-backend
services:
- name: backend
  github:
    branch: main
    repo: YOUR_GITHUB_USERNAME/raish  # CHANGE THIS
  build_command: ""
  http_port: 8000
  envs:
  - key: DATABASE_URL
    scope: RUN_AND_BUILD_TIME
    value: postgresql://${db.username}:${db.password}@${db.host}:${db.port}/${db.name}
  - key: ENVIRONMENT
    value: production
  health_check:
    http_path: /health
  http_routes:
  - path: /
    preserve_path_prefix: true

databases:
- name: db
  engine: PG
  production: true
  version: "16"
