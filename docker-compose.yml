version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: raish_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-raish_db}
      POSTGRES_USER: ${POSTGRES_USER:-raish}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - raish_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raish}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - raish_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: raish_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-raish}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-raish_db}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      JIOSAAVN_API_URL: ${JIOSAAVN_API_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - raish_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  raish_network:
    driver: bridge

volumes:
  raish_pg_data:
